<section class="bg-white rounded-2xl border border-slate-200/60 p-8 shadow-sm">
    <h2 class="text-lg font-bold text-slate-800">Timer Settings</h2>
    <p class="text-sm text-slate-400 mt-1 mb-6">Customize your focus and break durations</p>

    <div class="grid grid-cols-2 gap-5">
        <div class="flex flex-col gap-2">
            <label class="text-sm font-medium text-slate-600">Pomodoro Duration (minutes)</label>
            <input type="number" [(ngModel)]="pomodoro" (ngModelChange)="save()"
                    min="1" max="120"
                    class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200
                    rounded-xl text-sm font-semibold outline-none
                    focus:border-green-400 focus:bg-white"/>
        </div>

        <div class="flex flex-col gap-2">
            <label class="text-sm font-medium text-slate-600">Short Break Duration (minutes)</label>
            <input type="number" [(ngModel)]="shortBreak" (ngModelChange)="save()"
                    min="1" max="30"
                    class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200
                    rounded-xl text-sm font-semibold outline-none
                    focus:border-green-400 focus:bg-white"/>
        </div>

        <div class="flex flex-col gap-2">
            <label class="text-sm font-medium text-slate-600">Long Break Duration (minutes)</label>
            <input type="number" [(ngModel)]="longBreak" (ngModelChange)="save()"
                    min="1" max="60"
                    class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200
                    rounded-xl text-sm font-semibold outline-none
                    focus:border-green-400 focus:bg-white"/>
        </div>

        <div class="flex flex-col gap-2">
            <label class="text-sm font-medium text-slate-600">Sessions before long break</label>
            <input type="number" [(ngModel)]="sessionsBeforeLongBreak" (ngModelChange)="save()"
                    min="1" max="10"
                    class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200
                    rounded-xl text-sm font-semibold outline-none
                    focus:border-green-400 focus:bg-white"/>
        </div>
    </div>
</section>
